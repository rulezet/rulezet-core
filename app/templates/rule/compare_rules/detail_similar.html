{% extends 'base.html' %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/theme-bridge.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components/diff-viewer.css') }}">
{% endblock %}
{% block content %}
<div id="main-container" class="container py-5" v-cloak>
    <div class="row justify-content-center mb-5">
        <div class="col-lg-8 text-center">
            <h2 class="fw-bold mb-1 text-center text-primary">Identify Duplicates</h2>
            <div class="mx-auto mb-4" style="width: 60px; height: 4px; background-color: #0d6efd; border-radius: 2px;">
            </div>
            <p class="text-muted mt-2">Identify and merge overlapping logic within your security library.</p>
        </div>
    </div>

    <ul class="nav nav-underline justify-content-center w-100 mb-3" id="similarityTabs" role="tablist">
        <li class="nav-item flex-fill text-center">
            <a class="nav-link active" id="specific-tab" data-bs-toggle="tab" data-bs-target="#specific-pane" role="tab"
                aria-controls="specific-pane" aria-selected="true" style="color: var(--text-color); cursor: pointer;">
                Rule Similarity
            </a>
        </li>
        <li class="nav-item flex-fill text-center">
            <a class="nav-link" id="global-tab" data-bs-toggle="tab" data-bs-target="#global-pane" role="tab"
                aria-controls="global-pane" aria-selected="false" style="color: var(--text-color); cursor: pointer;">
                Global Similarity
            </a>
        </li>
    </ul>
    <div class="tab-content" id="similarityTabsContent">
        <div class="tab-pane fade show active" id="specific-pane" role="tabpanel">
            <div v-if="loading_specific" class="text-center py-5">
                <div class="spinner-grow text-primary" role="status"></div>
            </div>

            <div v-else class="animate__animated animate__fadeIn">
                <template v-if="similar_rules.length > 0">
                    <pagination-component v-if="specific_total_pages > 1" :current-page="specific_page"
                        :total-pages="specific_total_pages" @change-page="(p) => fetchSimilar(p)">
                    </pagination-component>

                    <similar-rule-card v-for="rule in similar_rules" :key="'spec-' + rule.rule_id"
                        :rule-a="rule.rule_a_data" :rule-b="rule.rule_b_data" :score="rule.score" type="specific"
                        :unique-id="'spec-' + rule.rule_id" @refresh-list="fetchSimilar(1)" :rule="rule"
                        :is-admin="{{ 'true' if current_user.is_admin() else 'false' }}">
                    </similar-rule-card>

                    <pagination-component v-if="specific_total_pages > 1" :current-page="specific_page"
                        :total-pages="specific_total_pages" @change-page="(p) => fetchSimilar(p)">
                    </pagination-component>
                </template>

                <template v-else>
                    <div class="text-center py-5">
                        <p class="text-muted">No similar rules found.</p>
                    </div>
                </template>

            </div>
        </div>

        <div class="tab-pane fade" id="global-pane" role="tabpanel">
            <div v-if="loading_global" class="text-center py-5">
                <div class="spinner-grow text-success" role="status"></div>
            </div>

            <div v-else class="animate__animated animate__fadeIn">
                <similar-rules-filter v-model:score="global_min_score" v-model:format="global_format"
                    @filter="fetchGlobalDuplicates(1)">
                </similar-rules-filter>
                <template v-if="global_duplicates.length > 0">

                    <pagination-component v-if="global_total_pages > 1" :current-page="global_page"
                        :total-pages="global_total_pages" @change-page="(p) => fetchGlobalDuplicates(p)">
                    </pagination-component>

                    <similar-rule-card v-for="(pair, index) in global_duplicates" :key="'glob-' + index"
                        :rule-a="pair.rule_a_data" :rule-b="pair.rule_b_data" :score="pair.score" type="global"
                        :unique-id="'glob-' + index" @refresh-list="fetchGlobalDuplicates(1)"
                        :is-admin="{{ 'true' if current_user.is_admin() else 'false' }}">
                    </similar-rule-card>

                    <pagination-component v-if="global_total_pages > 1" :current-page="global_page"
                        :total-pages="global_total_pages" @change-page="(p) => fetchGlobalDuplicates(p)">
                    </pagination-component>
                </template>

                <template v-else>
                    <div class="text-center py-5">
                        <p class="text-muted">No similar rules found.</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, onMounted } = Vue;
    import PaginationComponent from '/static/js/rule/paginationComponent.js';
    import SimilarRuleCard from '/static/js/rule/similarity/similarRulesCard.js';
    import SimilarRulesFilter from '/static/js/rule/similarity/similarRulesFilter.js';

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            PaginationComponent,
            SimilarRuleCard,
            SimilarRulesFilter
        },
        setup() {
            const similar_rules = ref([]);
            const specific_page = ref(1);
            const specific_total_pages = ref(1);
            const loading_specific = ref(false);

            const global_duplicates = ref([]);
            const global_page = ref(1);
            const global_total_pages = ref(1);
            const loading_global = ref(false);

            const global_min_score = ref(0.80);
            const global_format = ref('');

            async function fetchSimilar(page = 1) {
                loading_specific.value = true;

                const urlParams = new URLSearchParams(window.location.search);
                const compareWithId = urlParams.get('compare_with');

                const res = await fetch(`/rule/similar_detail/{{rule_id}}?page=${page}`);
                if (res.ok) {
                    const data = await res.json();


                    similar_rules.value = data.items.map(rule => ({
                        ...rule,
                        startOpen: compareWithId && String(rule.rule_b_data.id) === String(compareWithId)
                    }));

                    specific_page.value = data.current_page || page;
                    specific_total_pages.value = Math.ceil(data.total / 10);


                    if (compareWithId) {
                        setTimeout(() => {
                            const el = document.getElementById('spec-' + compareWithId);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 800);
                    }
                }
                loading_specific.value = false;
            }

            async function fetchGlobalDuplicates(page = 1) {
                loading_global.value = true;
                const params = new URLSearchParams({
                    page: page,
                    min_score: global_min_score.value,
                    format: global_format.value,
                });
                const res = await fetch(`/rule/similar_global_duplicates?${params.toString()}`);
                if (res.ok) {
                    const data = await res.json();

                    global_duplicates.value = data.items;
                    global_page.value = data.current_page || page;
                    global_total_pages.value = Math.ceil(data.total / 20);
                }
                loading_global.value = false;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }


            onMounted(() => {
                fetchSimilar(1);
                fetchGlobalDuplicates(1);
            });

            return {
                similar_rules, specific_page, specific_total_pages, loading_specific, fetchSimilar,
                global_duplicates, global_page, global_total_pages, loading_global, fetchGlobalDuplicates,
                SimilarRuleCard, global_min_score, SimilarRulesFilter, global_format,
            };
        }
    }).mount('#main-container');
</script>
{% endblock %}
