<link rel="stylesheet" href="/static/css/base/footer.css">

<footer class="rulezet-footer">
    <div class="container">

        <!-- Top row: brand + nav + actions -->
        <div class="footer-top">

            <!-- Brand -->
            <div class="footer-brand">
                <span class="footer-brand__name">Rulezet</span>
                <span class="footer-brand__badge">v{{ app_version }}</span>
                <p class="footer-brand__tagline">Built for security researchers.</p>
            </div>

            <!-- Nav links -->
            <nav class="footer-nav">
                <a href="/about" class="footer-nav__link">
                    <i class="fa-solid fa-circle-info"></i> About
                </a>
                <a href="https://github.com/rulezet/rulezet-core/discussions" target="_blank" class="footer-nav__link">
                    <i class="fa-solid fa-envelope"></i> Contact
                </a>
                <a href="https://rulezet.github.io/rulezet-core/" target="_blank" class="footer-nav__link">
                    <i class="fa-solid fa-book"></i> Documentation
                </a>
                <a href="/history_logo" class="footer-nav__link">
                    <i class="fa-solid fa-history"></i> History
                </a>
                <a href="https://www.gnu.org/licenses/agpl-3.0.html" rel="noreferrer" target="_blank" class="footer-nav__link">
                    <i class="fa-solid fa-balance-scale"></i> License
                </a>
            </nav>

            <!-- Actions: GitHub + theme toggle -->
            <div class="footer-actions">
                <a href="https://github.com/rulezet/rulezet-core.git" target="_blank"
                   class="footer-github" title="GitHub Source">
                    <i class="fa-brands fa-github"></i>
                </a>
                <div class="footer-theme-picker">
                    <i class="fas fa-palette footer-theme-icon"></i>
                    <select id="footer-theme-select" class="footer-theme-select" title="Switch theme">
                        <!-- auto-populated by theme.js on DOMContentLoaded -->
                    </select>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="footer-divider"></div>

        <!-- Bottom: copyright -->
        <div class="footer-bottom">
            <small>&copy; 2025 <strong>RULEZET</strong> — Open-source cybersecurity detection platform.</small>
        </div>

    </div>
</footer>
